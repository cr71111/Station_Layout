<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>换电站点布局分析报告</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/heatmap.js@2.0.5/build/heatmap.min.js"></script>
<script src="https://unpkg.com/leaflet-heatmap@1.0.0/leaflet-heatmap.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#222}
.header{background:linear-gradient(135deg,#1a3a6e,#2563eb);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:700}
.header .sub{font-size:12px;opacity:.8;margin-top:3px}
.stats-bar{display:flex;gap:10px;padding:12px 28px;background:#fff;border-bottom:1px solid #e5e7eb;flex-wrap:wrap}
.stat-card{background:#f8faff;border:1px solid #dbeafe;border-radius:10px;padding:9px 16px;text-align:center;min-width:100px}
.stat-card .num{font-size:24px;font-weight:700;color:#1d4ed8}
.stat-card .label{font-size:11px;color:#64748b;margin-top:2px}
.main{display:flex;height:calc(100vh - 144px)}
.sidebar{width:450px;min-width:400px;overflow-y:auto;background:#fff;border-right:1px solid #e5e7eb}
.sidebar-header{padding:12px;background:#f8faff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:10}
.search-box{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;outline:none}
.search-box:focus{border-color:#1d4ed8}
.filter-bar{display:flex;gap:6px;margin-top:8px}
.filter-btn{flex:1;padding:6px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;font-size:11px;cursor:pointer;text-align:center;transition:all .2s}
.filter-btn.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.station-card{border:1px solid #e5e7eb;border-radius:10px;margin:8px;overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.station-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.12)}
.station-head{padding:9px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.station-head.recommended{background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.station-head.other{background:#f8faff}
.station-name{font-size:13px;font-weight:700;color:#1e293b;flex:1}
.station-meta{font-size:11px;color:#64748b;margin-top:2px}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.badge-recommended{background:linear-gradient(135deg,#dbeafe,#bfdbfe);color:#1d4ed8}
.badge-other{background:#f3f4f6;color:#6b7280}
.score-bar{display:flex;align-items:center;gap:8px;padding:6px 12px 0}
.score-track{flex:1;height:7px;background:#e5e7eb;border-radius:3.5px;overflow:hidden}
.score-fill{height:100%;border-radius:3.5px;transition:width .3s}
.score-val{font-size:15px;font-weight:700;color:#1d4ed8;min-width:38px;text-align:right}
.tier-row{display:flex;gap:5px;padding:6px 12px 0;flex-wrap:wrap}
.tier-badge{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s}
.tier-badge:hover{transform:scale(1.05)}
.tier-1km{background:linear-gradient(135deg,#fee2e2,#fecaca);color:#991b1b;border-color:#fca5a5}
.tier-2km{background:linear-gradient(135deg,#ffedd5,#fed7aa);color:#c2410c;border-color:#fdba74}
.tier-3km{background:linear-gradient(135deg,#fef9c3,#fef08a);color:#854d0e;border-color:#fde047}
.tier-0{background:#f1f5f9;color:#94a3b8;border-color:#e2e8f0}
.cabinet-list{padding:0 12px 10px}
.cabinet-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:7px;margin-bottom:3px;background:#fafbff;font-size:11px}
.cabinet-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cabinet-item .cab-name{flex:1;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
.cabinet-item .cab-dist{color:#6b7280;flex-shrink:0}
.cabinet-item .cab-level{font-weight:600;flex-shrink:0}
.cabinet-item .cab-price{color:#f59e0b;flex-shrink:0}
.cabinet-item .cab-usage{color:#22c55e;flex-shrink:0}
.score-explain{padding:6px 12px 8px;font-size:10.5px;color:#64748b;line-height:1.6;border-top:1px solid #f3f4f6;margin-top:4px}
.score-explain b{color:#374151}
#mapContainer{flex:1;position:relative}
#mapDiv{width:100%;height:100%}
.map-legend{position:absolute;bottom:20px;right:20px;z-index:999;background:#fff;border-radius:10px;padding:10px 14px;box-shadow:0 2px 10px rgba(0,0,0,.15);font-size:11px}
.map-legend b{display:block;margin-bottom:6px;color:#374151;font-size:12px}
.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-line{width:18px;height:3px;border-radius:2px;flex-shrink:0}
.btn-clear{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:600;transition:background .2s;white-space:nowrap}
.btn-clear:hover{background:rgba(255,255,255,.3)}
.heatmap-toggle{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:999;display:flex;gap:6px;background:#fff;border-radius:10px;padding:6px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.heatmap-btn{padding:6px 14px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;font-size:11px;cursor:pointer;transition:all .2s}
.heatmap-btn.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.station-count{padding:8px 12px;font-size:11px;color:#64748b;border-bottom:1px solid #f3f4f6}
.circle-info{position:absolute;top:52px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(26,54,110,.92);color:#fff;border-radius:8px;padding:6px 14px;font-size:11px;box-shadow:0 2px 10px rgba(0,0,0,.25);display:none;white-space:nowrap}
.circle-info span{margin:0 6px;font-weight:600}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
</style>
</head>
<body>
<div class="header">
  <div><h1>换电站点布局分析报告</h1><div class="sub">自营场站 × 现有电柜 × GPS平滑热力图 × 1/2/3km分层分析</div></div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="btn-clear" id="btnClear" onclick="clearSelection()" style="display:none">&#10005; 清除范围</button>
    <div style="font-size:11px;opacity:.7">成都市</div>
  </div>
</div>
<div class="stats-bar">
  <div class="stat-card"><div class="num" id="s1">&#8212;</div><div class="label">可布局场站</div></div>
  <div class="stat-card"><div class="num" id="s2">&#8212;</div><div class="label">推荐站点</div></div>
  <div class="stat-card"><div class="num" id="s3">&#8212;</div><div class="label">其他站点</div></div>
  <div class="stat-card"><div class="num" id="s4">&#8212;</div><div class="label">现有电柜</div></div>
  <div class="stat-card"><div class="num" id="s5">&#8212;</div><div class="label">GPS数据点</div></div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <input type="text" class="search-box" placeholder="搜索场站名称..." oninput="filterStations(this.value)">
      <div class="filter-bar">
        <div class="filter-btn active" onclick="renderAllStations('recommended');this.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">已选+推荐</div>
        <div class="filter-btn" onclick="renderAllStations('other');this.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">其他站点</div>
      </div>
    </div>
    <div class="station-count" id="stationCount">共 0 个场站</div>
    <div id="stationList"></div>
  </div>
  <div id="mapContainer">
    <div id="mapDiv"></div>
    <div class="circle-info" id="circleInfo"></div>
    <div class="heatmap-toggle">
      <div class="heatmap-btn active" onclick="setHeatmap('all')">总体热力</div>
      <div class="heatmap-btn" onclick="setHeatmap('driving')">行驶状态</div>
      <div class="heatmap-btn" onclick="setHeatmap('parked')">停车状态</div>
    </div>
    <div class="map-legend">
      <b>图例说明</b>
      <div class="legend-item"><div class="legend-line" style="background:#ef4444"></div>1km范围（红）</div>
      <div class="legend-item"><div class="legend-line" style="background:#f59e0b"></div>2km范围（橙）</div>
      <div class="legend-item"><div class="legend-line" style="background:#22c55e"></div>3km范围（绿）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1d4ed8"></div>推荐场站</div>
      <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>其他场站</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>高/特高电柜</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>中高电柜</div>
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>中等级电柜</div>
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(90deg,#0000FF,#00FFFF,#00FF00,#FFFF00,#FF0000,#800000)"></div>GPS平滑热力密度</div>
    </div>
  </div>
</div>
<script>
let GPS_INLINE = {};
let DATA = {};
let map, heatmapLayer, circleLayers=[];

function levelColor(lv){
  if(lv==='特高'||lv==='高') return '#ef4444';
  if(lv==='中高') return '#f59e0b';
  if(lv==='中') return '#22c55e';
  return '#94a3b8';
}
function getScoreColor(score){
  if(score>=80) return '#10b981';
  if(score>=60) return '#22c55e';
  if(score>=40) return '#f59e0b';
  return '#ef4444';
}
function clearSelection(){
  circleLayers.forEach(l=>map.removeLayer(l));
  circleLayers=[];
  document.getElementById('btnClear').style.display='none';
  document.getElementById('circleInfo').style.display='none';
  map.flyTo([30.65,104.07],11,{duration:0.8});
}
function flyToWithCircles(lon,lat){
  circleLayers.forEach(l=>map.removeLayer(l));
  circleLayers=[];
  map.flyTo([lat,lon],13,{duration:0.8});
  const colors=['#ef4444','#f59e0b','#22c55e'];
  const radii=[1000,2000,3000];
  radii.forEach((r,i)=>{
    const c=L.circle([lat,lon],{
      radius:r,color:colors[i],weight:2,fillColor:colors[i],
      fillOpacity:0.06+i*0.03,dashArray:i===0?'':'8 4'
    }).addTo(map);
    circleLayers.push(c);
  });
  document.getElementById('btnClear').style.display='inline-block';
  document.getElementById('circleInfo').innerHTML='<span style="color:#ef4444">●</span>1km <span style="color:#f59e0b">●</span>2km <span style="color:#22c55e">●</span>3km 范围圈';
  document.getElementById('circleInfo').style.display='block';
}
function updateStats(){
  document.getElementById('s1').textContent=DATA.summary.total_stations;
  document.getElementById('s2').textContent=DATA.summary.recommended_count||0;
  document.getElementById('s3').textContent=DATA.summary.other_count||0;
  document.getElementById('s4').textContent=DATA.summary.total_cabinets;
  document.getElementById('s5').textContent=DATA.gps_all?DATA.gps_all.length:0;
}
function getStatusBadge(s){
  if(s['是否选择']==='已选') return '<span class="badge badge-recommended">已选</span>';
  if((s['综合分']||0)>0) return '<span class="badge badge-recommended">推荐</span>';
  return '<span class="badge badge-other">其他</span>';
}
function buildExplain(s,t1,t2,t3){
  const score=s['综合分']||0;
  const isSelected=s['是否选择']==='已选';
  if(isSelected) return `<div class="score-explain"><b>✓ 已选场站</b> — 综合分=${score.toFixed(1)}。计算公式：GPS热度分 + (1km高等级×6 + 总柜×3) + (2km高等级×2 + 总柜×1) + (3km高等级×1) × 权重系数。当前1km内${t1.total}柜(${t1.high}高)、2km内${t2.total}柜(${t2.high}高)、3km内${t3.total}柜(${t3.high}高)。</div>`;
  if(score>0) return `<div class="score-explain"><b>✓ 推荐布局</b> — 综合分=${score.toFixed(1)}。基于GPS人员热度 + 周边1/2/3km电柜竞争度加权计算得出。1km内${t1.total}柜(${t1.high}高等级)、2km内${t2.total}柜(${t2.high}高等级)、3km内${t3.total}柜(${t3.high}高等级)，竞争压力适中可优先布局。</div>`;
  return `<div class="score-explain"><b>待观察</b> — 暂无评分数据。3km内${t3.total}柜(${t3.high}高等级)，建议补充GPS数据后重新评估。</div>`;
}
function renderAllStations(filter){
  const el=document.getElementById('stationList');
  let allStations=DATA.all_stations||[];
  let newSites=DATA.all_new_sites||[];
  let stations=[];
  if(filter==='recommended'){
    stations=allStations.filter(s=>s['是否选择']==='已选'||(s['综合分']||0)>0);
    newSites.filter(s=>(s['综合分']||0)>0).forEach(s=>stations.push(s));
    stations.sort((a,b)=>(b['综合分']||0)-(a['综合分']||0));
  } else {
    stations=allStations.filter(s=>s['是否选择']!=='已选'&&(s['综合分']||0)<=0);
    newSites.filter(s=>(s['综合分']||0)<=0).forEach(s=>stations.push(s));
  }
  document.getElementById('stationCount').textContent='共 '+stations.length+' 个场站';
  let h='';
  stations.forEach((s,idx)=>{
    const isRec=s['是否选择']==='已选'||(s['综合分']||0)>0;
    const headClass=isRec?'recommended':'other';
    const score=s['综合分']||0;
    const tierData=DATA.nearby_tiers[s['名称']]||{};
    const t1=tierData['1km']||{total:0,high:0,list:[]};
    const t2=tierData['2km']||{total:0,high:0,list:[]};
    const t3=tierData['3km']||{total:0,high:0,list:[]};
    h+=`<div class="station-card" onclick="flyToWithCircles(${s['经度']},${s['纬度']})">
      <div class="station-head ${headClass}">
        <div><div class="station-name"><span style="color:#94a3b8;font-size:11px;margin-right:4px">${String(idx+1).padStart(2,'0')}</span>${s['名称']}</div>
        <div class="station-meta">${s['地区']||s['地址']||''} · ${s['属性']||''} · 终端${s['终端数']||'-'}个</div></div>
        ${getStatusBadge(s)}
      </div>
      <div class="score-bar">
        <div class="score-track"><div class="score-fill" style="width:${Math.min(score,100)}%;background:${getScoreColor(score)}"></div></div>
        <div class="score-val">${score.toFixed(1)}</div>
      </div>
      ${buildExplain(s,t1,t2,t3)}
      <div class="tier-row">
        <div class="tier-badge ${t1.total>0?'tier-1km':'tier-0'}" onclick="event.stopPropagation();flyToTier('${s['名称']}',1)">1km · <b>${t1.total}</b>柜(${t1.high}高)</div>
        <div class="tier-badge ${t2.total>t1.total?'tier-2km':(t2.total>0?'tier-1km':'tier-0')}" onclick="event.stopPropagation();flyToTier('${s['名称']}',2)">2km · <b>${t2.total}</b>柜(${t2.high}高)</div>
        <div class="tier-badge ${t3.total>t2.total?'tier-3km':(t3.total>0?'tier-2km':'tier-0')}" onclick="event.stopPropagation();flyToTier('${s['名称']}',3)">3km · <b>${t3.total}</b>柜(${t3.high}高)</div>
      </div>`;
    const allCabs=[...(t3.list||[])];
    if(allCabs.length>0){
      h+=`<div class="cabinet-list">`;
      allCabs.forEach(c=>{
        h+=`<div class="cabinet-item">
          <div class="dot" style="background:${levelColor(c['等级'])}"></div>
          <span class="cab-name">${c['品牌']}·${c['站点'].substring(0,10)}</span>
          <span class="cab-level" style="color:${levelColor(c['等级'])}">${c['等级']}</span>
          <span class="cab-price">${c['电费单价']}元</span>
          <span class="cab-usage">${c['用电度数']}度</span>
          <span class="cab-dist">${c['距离km']}km</span>
        </div>`;
      });
      h+=`</div>`;
    } else {
      h+=`<div class="cabinet-list"><div style="text-align:center;padding:10px;color:#9ca3af;font-size:12px;background:#f9fafb;border-radius:8px">3km内暂无电柜</div></div>`;
    }
    h+=`</div>`;
  });
  el.innerHTML=h;
}
function flyToTier(name,tier){
  const s=(DATA.all_stations||[]).find(x=>x['名称']===name)||(DATA.all_new_sites||[]).find(x=>x['名称']===name);
  if(!s)return;
  flyToWithCircles(s['经度'],s['纬度']);
}

function buildHeatData(points){
  if(!points||points.length===0) return {data:[],max:1};
  const maxCount=Math.max(...points.map(p=>p._count||1));
  return {
    max:maxCount,
    data:points.map(p=>({
      lat:p['纬度'],
      lng:p['经度'],
      value:p._count||1
    }))
  };
}

function setHeatmap(type){
  document.querySelectorAll('.heatmap-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if(!heatmapLayer) return;
  let points=[];
  if(type==='all') points=DATA.gps_all||[];
  else if(type==='driving') points=DATA.gps_driving||[];
  else if(type==='parked') points=DATA.gps_parked||[];
  const hd=buildHeatData(points);
  heatmapLayer.setData(hd);
}

function initMap(){
  map=L.map('mapDiv',{center:[30.65,104.07],zoom:11});
  L.tileLayer('https://webrd04.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{
    attribution:'© 高德地图',maxZoom:18,opacity:.70
  }).addTo(map);

  const cfg={
    radius:25,
    maxOpacity:0.8,
    minOpacity:0.02,
    scaleRadius:true,
    useLocalExtrema:false,
    latField:'lat',
    lngField:'lng',
    valueField:'value',
    gradient:{
      0.0:'#0000FF',
      0.25:'#00FFFF',
      0.45:'#00FF00',
      0.55:'#FFFF00',
      0.65:'#FF8000',
      0.85:'#FF0000',
      1.0:'#800000'
    }
  };
  heatmapLayer=new HeatmapOverlay(cfg);
  map.addLayer(heatmapLayer);

  const hd=buildHeatData(DATA.gps_all||[]);
  heatmapLayer.setData(hd);

  DATA.all_cabinets.forEach(c=>{
    const col=levelColor(c['等级']);
    const r=(c['等级']==='特高'||c['等级']==='高')?10:(c['等级']==='中高'?8:6);
    L.circleMarker([c['纬度'],c['经度']],{radius:r+3,color:'#ffffff',weight:1,fillColor:'#ffffff',fillOpacity:1}).addTo(map);
    L.circleMarker([c['纬度'],c['经度']],{radius:r,color:col,weight:1.5,fillColor:col,fillOpacity:.9})
      .addTo(map)
      .bindPopup(`<b>${c['品牌']} · ${c['站点']}</b><br>等级: <b style="color:${col}">${c['等级']}</b><br>电费: ${c['电费单价']}元/度 · 用电: ${c['用电度数']}度<br>日均换电: ${c['日均换电']} 次/仓 · 仓数: ${c['仓数']}`);
  });

  DATA.all_stations.forEach(s=>{
    const isRec=s['是否选择']==='已选'||(s['综合分']||0)>=40;
    const col=isRec?'#1d4ed8':'#94a3b8';
    const sz=isRec?22:16;
    const icon=L.divIcon({
      html:`<div style="width:${sz+4}px;height:${sz+4}px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.35)">
        <div style="width:${sz}px;height:${sz}px;background:${col};border:3px solid white;border-radius:50%"></div>
      </div>`,
      className:'',iconSize:[sz+4,sz+4],iconAnchor:[(sz+4)/2,(sz+4)/2]
    });
    L.marker([s['纬度'],s['经度']],{icon})
      .addTo(map)
      .bindPopup(`<b>${s['名称']}</b><br><span style="color:${col};font-weight:600">${isRec?'推荐站点':'其他站点'}</span> · ${s['地区']}<br>综合分: ${s['综合分']||0}<br>类型: ${s['属性']} · 终端: ${s['终端数']}个`);
  });

  (DATA.all_new_sites||[]).forEach(s=>{
    const isRec=(s['综合分']||0)>=40;
    const col=isRec?'#10b981':'#94a3b8';
    const sz=isRec?18:14;
    const icon=L.divIcon({
      html:`<div style="width:${sz+4}px;height:${sz+4}px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.35)">
        <div style="width:${sz}px;height:${sz}px;background:${col};border:3px solid white;border-radius:50%"></div>
      </div>`,
      className:'',iconSize:[sz+4,sz+4],iconAnchor:[(sz+4)/2,(sz+4)/2]
    });
    L.marker([s['纬度'],s['经度']],{icon})
      .addTo(map)
      .bindPopup(`<b>${s['名称']}</b><br><span style="color:${col};font-weight:600">${isRec?'推荐站点':'其他站点'}</span><br>综合分: ${s['综合分']||0}<br>${s['地址']}`);
  });
}

function loadData(){
  Promise.all([
    fetch('data/gps_data.json').then(response => response.json()),
    fetch('data/station_data.json').then(response => response.json())
  ]).then(([gpsData, stationData]) => {
    GPS_INLINE = gpsData;
    DATA = stationData;
    
    // 合并GPS数据到DATA对象
    DATA.gps_all = gpsData.gps_all;
    DATA.gps_driving = gpsData.gps_driving || [];
    DATA.gps_parked = gpsData.gps_parked || [];
    
    updateStats();
    renderAllStations('recommended');
    initMap();
  }).catch(error => {
    console.error('加载数据失败:', error);
    alert('数据加载失败，请刷新页面重试');
  });
}

window.addEventListener('load', loadData);

function filterStations(keyword){
  // 实现搜索功能
  const el=document.getElementById('stationList');
  let allStations=DATA.all_stations||[];
  let newSites=DATA.all_new_sites||[];
  let stations=[...allStations, ...newSites];
  
  if(keyword){
    stations=stations.filter(s=>s['名称'].includes(keyword)||s['地区']?.includes(keyword)||s['地址']?.includes(keyword));
  }
  
  document.getElementById('stationCount').textContent='共 '+stations.length+' 个场站';
  let h='';
  stations.forEach((s,idx)=>{
    const isRec=s['是否选择']==='已选'||(s['综合分']||0)>0;
    const headClass=isRec?'recommended':'other';
    const score=s['综合分']||0;
    const tierData=DATA.nearby_tiers[s['名称']]||{};
    const t1=tierData['1km']||{total:0,high:0,list:[]};
    const t2=tierData['2km']||{total:0,high:0,list:[]};
    const t3=tierData['3km']||{total:0,high:0,list:[]};
    h+=`<div class="station-card" onclick="flyToWithCircles(${s['经度']},${s['纬度']})">
      <div class="station-head ${headClass}">
        <div><div class="station-name"><span style="color:#94a3b8;font-size:11px;margin-right:4px">${String(idx+1).padStart(2,'0')}</span>${s['名称']}</div>
        <div class="station-meta">${s['地区']||s['地址']||''} · ${s['属性']||''} · 终端${s['终端数']||'-'}个</div></div>
        ${getStatusBadge(s)}
      </div>
      <div class="score-bar">
        <div class="score-track"><div class="score-fill" style="width:${Math.min(score,100)}%;background:${getScoreColor(score)}"></div></div>
        <div class="score-val">${score.toFixed(1)}</div>
      </div>
      ${buildExplain(s,t1,t2,t3)}
      <div class="tier-row">
        <div class="tier-badge ${t1.total>0?'tier-1km':'tier-0'}" onclick="event.stopPropagation();flyToTier('${s['名称']}',1)">1km · <b>${t1.total}</b>柜(${t1.high}高)</div>
        <div class="tier-badge ${t2.total>t1.total?'tier-2km':(t2.total>0?'tier-1km':'tier-0')}" onclick="event.stopPropagation();flyToTier('${s['名称']}',2)">2km · <b>${t2.total}</b>柜(${t2.high}高)</div>
        <div class="tier-badge ${t3.total>t2.total?'tier-3km':(t3.total>0?'tier-2km':'tier-0')}" onclick="event.stopPropagation();flyToTier('${s['名称']}',3)">3km · <b>${t3.total}</b>柜(${t3.high}高)</div>
      </div>`;
    const allCabs=[...(t3.list||[])];
    if(allCabs.length>0){
      h+=`<div class="cabinet-list">`;
      allCabs.forEach(c=>{
        h+=`<div class="cabinet-item">
          <div class="dot" style="background:${levelColor(c['等级'])}"></div>
          <span class="cab-name">${c['品牌']}·${c['站点'].substring(0,10)}</span>
          <span class="cab-level" style="color:${levelColor(c['等级'])}">${c['等级']}</span>
          <span class="cab-price">${c['电费单价']}元</span>
          <span class="cab-usage">${c['用电度数']}度</span>
          <span class="cab-dist">${c['距离km']}km</span>
        </div>`;
      });
      h+=`</div>`;
    } else {
      h+=`<div class="cabinet-list"><div style="text-align:center;padding:10px;color:#9ca3af;font-size:12px;background:#f9fafb;border-radius:8px">3km内暂无电柜</div></div>`;
    }
    h+=`</div>`;
  });
  el.innerHTML=h;
}

</script>
